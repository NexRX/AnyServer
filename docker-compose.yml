# ═══════════════════════════════════════════════════════════════
#  AnyServer — Docker Compose
# ═══════════════════════════════════════════════════════════════
#
#  Quick start:
#    docker compose up -d
#
#  The web UI will be available at http://localhost:3001
#  SFTP access is available on port 2222
#
# ═══════════════════════════════════════════════════════════════

services:
  anyserver:
    build: .
    ports:
      - "3001:3001"
      - "2222:2222"
    volumes:
      - anyserver-data:/app/data
    restart: unless-stopped
    environment:
      ANYSERVER_DATA_DIR: /app/data
      ANYSERVER_HTTP_PORT: "3001"
      ANYSERVER_SFTP_PORT: "2222"
      RUST_LOG: "anyserver=info,tower_http=info"

      # ── Production settings (uncomment and configure) ──────
      #
      # Set a stable JWT secret so tokens survive container restarts.
      # Use a long random string (64+ characters recommended).
      # ANYSERVER_JWT_SECRET: "change-me-to-a-long-random-secret"
      #
      # If running behind a reverse proxy, set the allowed origins:
      # ANYSERVER_CORS_ORIGIN: "https://your-domain.example.com"
      #
      # Trust your reverse proxy's IP for X-Forwarded-For headers:
      # ANYSERVER_TRUSTED_PROXIES: "172.16.0.0/12,10.0.0.0/8"
      #
      # Force the Secure flag on cookies (set to "true" behind HTTPS):
      # ANYSERVER_COOKIE_SECURE: "auto"
      #
      # Tune the SQLite connection pool for heavier workloads:
      # ANYSERVER_DB_MAX_CONNECTIONS: "16"

volumes:
  anyserver-data:
